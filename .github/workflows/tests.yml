name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    name: Run tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            homeassistant \
            pytest \
            pytest-asyncio \
            voluptuous \
            psutil

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  validate:
    name: Validate integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate manifest.json
        run: python -c "import json; json.load(open('custom_components/ha_performance_diagnostics/manifest.json'))"

      - name: Validate hacs.json
        run: python -c "import json; json.load(open('hacs.json'))"

      - name: Validate strings.json
        run: python -c "import json; json.load(open('custom_components/ha_performance_diagnostics/strings.json'))"

      - name: Validate translations
        run: python -c "import json; json.load(open('custom_components/ha_performance_diagnostics/translations/en.json'))"
